name: Test Quality Gate

on:
  pull_request:
    paths:
      - 'tests/compatibility/**'
  push:
    branches: [main]

jobs:
  quality-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Install dependencies
        run: uv sync

      - name: Validate test quality
        run: |
          # Fail if >5% of tests don't contact server
          uv run python scripts/validate_test_quality.py \
            --max-no-contact-pct 5 \
            --max-no-assertion-pct 10

      - name: Generate quality report
        if: always()
        run: |
          uv run python scripts/validate_test_quality.py --json > quality-report.json
          cat quality-report.json

      - name: Upload quality report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-report
          path: quality-report.json
